name: Coverage Summary

on:
  pull_request_target:
    branches: [ "main" ]
    types:
      - opened
      - synchronize
      - reopened

permissions:
  checks: write
  pull-requests: write
  contents: read
  actions: read

jobs:
  publish:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest

    steps:
      - name: Find latest CI run
        id: artifact
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pullRequestNumber = context.payload.pull_request.number;
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event: 'pull_request',
              status: 'completed',
              per_page: 100,
            });

            const ciRun = runs.data.workflow_runs.find(run =>
              run.name === 'CI' &&
              run.conclusion === 'success' &&
              Array.isArray(run.pull_requests) &&
              run.pull_requests.some(pr => pr.number === pullRequestNumber)
            );

            if (!ciRun) {
              core.setFailed(`Successful CI run not found for PR #${pullRequestNumber}.`);
              return;
            }

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ciRun.id,
              per_page: 100,
            });

            const artifact = artifacts.data.artifacts.find(item => item.name === 'coverage-results');

            if (!artifact) {
              core.setFailed(`Coverage artifact not found for CI run ${ciRun.id}.`);
              return;
            }

            core.setOutput('archive_url', artifact.archive_download_url);

      - name: Download coverage summary artifact
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "${{ steps.artifact.outputs.archive_url }}" \
            -o coverage-results.zip
          mkdir -p ./coverage-results
          unzip -o coverage-results.zip -d ./coverage-results

      - name: Process coverage summary
        uses: im-open/process-code-coverage-summary@v2.2.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-file: './coverage-results/Summary.md'
          create-status-check: true
          create-pr-comment: true
          update-comment-if-one-exists: true
          update-comment-key: 'dotnet'
          ignore-threshold-failures: false
          line-threshold: 80
          branch-threshold: 80
